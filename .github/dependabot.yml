version: 2
updates:
  # Ruby gems (under spree/ engine directories)
  - package-ecosystem: bundler
    directory: "/spree/core"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # JavaScript/TypeScript (pnpm workspace — single root lockfile)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      typescript-packages:
        patterns:
          - "*"
