        schema:
          type: string
      - name: q[categories_id_eq]
        in: query
        required: false
        description: Filter by category ID
        schema:
          type: string
      - name: q[price_gte]
        in: query
        required: false
        description: Filter by minimum price
        schema:
          type: number
      - name: q[price_lte]
        in: query
        required: false
        description: Filter by maximum price
        schema:
          type: number
