- name: Payments
  description: Order payment management — capture, void, off-session charges
- name: Refunds
  description: Order refund management
- name: Fulfillments
  description: Order fulfillment management — ship, cancel, split
- name: Order Gift Cards
  description: Apply / remove gift cards on an order
- name: Order Store Credits
  description: Apply / remove customer store credit on an order
- name: Customers
  description: Customer management — profile, tags, marketing consent, notes
- name: Customer Addresses
