                barcode:
                  type: string
                prices:
                  type: array
                  items:
                    type: object
                    properties:
                      currency:
                        type: string
                        example: USD
                      amount:
                        type: number
                        example: 29.99
                      compare_at_amount:
                        type: number
                        example: 39.99
                    required:
                    - currency
                    - amount
                stock_items:
                  type: array
                  items:
                    type: object
                    properties:
                      stock_location_id:
                        type: string
                      count_on_hand:
                        type: integer
                      backorderable:
                        type: boolean
    delete:
      summary: Delete a variant
      tags:
      - Variants
      security:
      - api_key: []
        bearer_auth: []
      description: Soft-deletes a variant.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      - name: id
        in: path
        required: true
        description: Variant prefixed ID
        schema:
          type: string
      responses:
        '204':
          description: variant deleted
